syntax = "proto3";
option go_package = "codeberg.org/will-x86/bdns/dns/pkg/proto";
import "google/protobuf/wrappers.proto";


package proto;


service Authentication{
    // Accepts TimeZone and returns userID
    rpc SignUp (TimeZone) returns (UserID);
    rpc Login (UserID) returns (google.protobuf.BoolValue);
}


message TimeZone {
    // Request message contains the name to be greeted
    string timezone = 1;
}

message UserID {
    string userID = 1;
}
