syntax = "proto3";
option go_package = "codeberg.org/will-x86/bdns/api/pkg/proto/pb";

package proto;

service UserService {
    rpc GetUser(GetUserRequest) returns (User);
    rpc UpdateUser(UpdateUserRequest) returns (User);
}

message GetUserRequest {
    string user_id = 1;
}

message UpdateUserRequest {
    string user_id = 1;
    string timezone = 2;
}

message User {
    string id = 1;
    string timezone = 2;
    int64 created_at = 3;
}
