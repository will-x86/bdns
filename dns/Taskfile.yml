version: '3'

tasks:
  proto:
    cmds:
      - mkdir -p pkg/proto/pb
      - protoc
        --proto_path=../api/proto
        --go_out=pkg/proto/pb
        --go_opt=paths=source_relative
        --go-grpc_out=pkg/proto/pb
        --go-grpc_opt=paths=source_relative
        $(find ../api/proto -name "*.proto")

